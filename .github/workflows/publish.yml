name: publish-package

env:
  MOONBIT_VERSION: 0.10.3+16975d007
  MOONBIT_CORE_VERSION: 0.10.3+16975d007
  MIN_COVERAGE_PERCENT: 100

on:
  workflow_dispatch:

jobs:
  publish:
    # Use macos-latest or windows-latest if you want to publish to those platforms
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: install pinned MoonBit
        uses: hustcer/setup-moonbit@9199da0ab63ea0c0bab1dc15f03d76e17ed4f75f # v1.22
        with:
          version: ${{ env.MOONBIT_VERSION }}
          core-version: ${{ env.MOONBIT_CORE_VERSION }}

      - name: post install
        run: |
          moon version --all
          moon update

      - name: prepublish check
        shell: bash
        run: |
          moon check --target all --warn-list +73 --deny-warn
          moon info
          moon fmt
          git diff --exit-code
          untracked_mbti="$(git ls-files --others --exclude-standard -- pkg.generated.mbti ':(glob)**/pkg.generated.mbti')"
          if [ -n "$untracked_mbti" ]; then
            echo "moon info generated untracked interface files:"
            printf '%s\n' "$untracked_mbti"
            exit 1
          fi
          moon test --target wasm
          moon test --target wasm --release
          moon test --target wasm-gc
          moon test --target wasm-gc --release
          moon test --target js
          moon test --target js --release
          moon test --target native
          moon test --target native --release

      - name: coverage gate
        shell: bash
        run: |
          coverage_file="$RUNNER_TEMP/flate-coverage.txt"
          moon coverage clean
          moon test --target native --enable-coverage --no-parallelize \
            --warn-list +73 --deny-warn
          moon coverage report -- -f summary | tee "$coverage_file"
          awk -v minimum="$MIN_COVERAGE_PERCENT" '
            /^Total:/ {
              split($2, counts, "/")
              found = 1
              if (100 * counts[1] / counts[2] < minimum) exit 1
            }
            END { if (!found) exit 1 }
          ' "$coverage_file"

      - name: publish
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBIT_COMMUNITY_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SECRET" ]; then
            echo "Error: MOONCAKES_MOONBIT_COMMUNITY_TOKEN secret is not set."
            echo "Please contact an admin to grant access to this secret."
            exit 1
          fi
          credentials="$HOME/.moon/credentials.json"
          mkdir -p "$(dirname "$credentials")"
          trap 'rm -f "$credentials"' EXIT
          (umask 077; printf '%s\n' "$SECRET" > "$credentials")
          chmod 600 "$credentials"
          moon publish
